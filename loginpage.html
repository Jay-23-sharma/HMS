<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #0070f3;
      color:black;
      border: none;
      border-radius: 444px;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #005ecb;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>

    <input type="email" placeholder="Email" />
    <input type="password" placeholder="Password" />

    <button>edited login page is here</button>
    
  </div>
</body>
</html>
